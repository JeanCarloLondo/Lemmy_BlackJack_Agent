<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fafc"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ebf4ff"/>
      <stop offset="100%" stop-color="#bee3f8"/>
    </linearGradient>
    <linearGradient id="hiddenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6fffa"/>
      <stop offset="100%" stop-color="#b2f5ea"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#fbd38d"/>
    </linearGradient>
    <linearGradient id="targetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#d6bcfa"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d3748"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#805ad5"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="640" y="48" text-anchor="middle" font-size="24" font-weight="700" fill="#1a365d">
    Base Architecture — Fully-Connected Double DQN
  </text>
  <text x="640" y="74" text-anchor="middle" font-size="14" fill="#4a5568">
    Inherited from the previous Artificial Intelligence course project (Universidad EAFIT, 2025-2)
  </text>

  <!-- Policy Network Row -->
  <text x="80" y="140" font-size="14" font-weight="600" fill="#2d3748">Policy Network &#x3B8;</text>

  <!-- Input -->
  <rect x="60" y="160" width="180" height="180" rx="10" fill="url(#inputGrad)" stroke="#2c5282" stroke-width="2"/>
  <text x="150" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#1a365d">Input Layer</text>
  <text x="150" y="210" text-anchor="middle" font-size="13" fill="#2c5282">State Vector s &#x2208; &#x211D;&#xB9;&#x2070;</text>
  <line x1="80" y1="222" x2="220" y2="222" stroke="#2c5282" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="150" y="240" text-anchor="middle" font-size="11" fill="#2d3748">player_total / 21</text>
  <text x="150" y="256" text-anchor="middle" font-size="11" fill="#2d3748">usable_ace</text>
  <text x="150" y="272" text-anchor="middle" font-size="11" fill="#2d3748">dealer_up (norm.)</text>
  <text x="150" y="288" text-anchor="middle" font-size="11" fill="#2d3748">true_count (tanh)</text>
  <text x="150" y="304" text-anchor="middle" font-size="11" fill="#2d3748">cards_remaining</text>
  <text x="150" y="320" text-anchor="middle" font-size="11" fill="#2d3748">can_double / can_split</text>

  <!-- Arrow to FC1 -->
  <line x1="244" y1="250" x2="294" y2="250" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FC 512 (1) -->
  <rect x="298" y="180" width="160" height="140" rx="10" fill="url(#hiddenGrad)" stroke="#2f855a" stroke-width="2"/>
  <text x="378" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#22543d">FC Layer 1</text>
  <text x="378" y="232" text-anchor="middle" font-size="13" fill="#2f855a">Linear(10 &#x2192; 512)</text>
  <text x="378" y="252" text-anchor="middle" font-size="12" fill="#2d3748">+ ReLU</text>
  <text x="378" y="278" text-anchor="middle" font-size="11" fill="#4a5568">Xavier init</text>
  <text x="378" y="296" text-anchor="middle" font-size="11" fill="#4a5568">5,632 params</text>

  <line x1="462" y1="250" x2="512" y2="250" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FC 512 (2) -->
  <rect x="516" y="180" width="160" height="140" rx="10" fill="url(#hiddenGrad)" stroke="#2f855a" stroke-width="2"/>
  <text x="596" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#22543d">FC Layer 2</text>
  <text x="596" y="232" text-anchor="middle" font-size="13" fill="#2f855a">Linear(512 &#x2192; 512)</text>
  <text x="596" y="252" text-anchor="middle" font-size="12" fill="#2d3748">+ ReLU</text>
  <text x="596" y="278" text-anchor="middle" font-size="11" fill="#4a5568">Xavier init</text>
  <text x="596" y="296" text-anchor="middle" font-size="11" fill="#4a5568">262,656 params</text>

  <line x1="680" y1="250" x2="730" y2="250" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FC 256 -->
  <rect x="734" y="180" width="160" height="140" rx="10" fill="url(#hiddenGrad)" stroke="#2f855a" stroke-width="2"/>
  <text x="814" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#22543d">FC Layer 3</text>
  <text x="814" y="232" text-anchor="middle" font-size="13" fill="#2f855a">Linear(512 &#x2192; 256)</text>
  <text x="814" y="252" text-anchor="middle" font-size="12" fill="#2d3748">+ ReLU</text>
  <text x="814" y="278" text-anchor="middle" font-size="11" fill="#4a5568">Xavier init</text>
  <text x="814" y="296" text-anchor="middle" font-size="11" fill="#4a5568">131,328 params</text>

  <line x1="898" y1="250" x2="948" y2="250" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="952" y="160" width="220" height="180" rx="10" fill="url(#outputGrad)" stroke="#c05621" stroke-width="2"/>
  <text x="1062" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#7b341e">Output Head</text>
  <text x="1062" y="210" text-anchor="middle" font-size="13" fill="#c05621">Q(s, &#xB7;) &#x2208; &#x211D;&#x2074;</text>
  <line x1="970" y1="222" x2="1154" y2="222" stroke="#c05621" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="1062" y="244" text-anchor="middle" font-size="12" fill="#2d3748">a&#x2080; = HIT</text>
  <text x="1062" y="262" text-anchor="middle" font-size="12" fill="#2d3748">a&#x2081; = STAND</text>
  <text x="1062" y="280" text-anchor="middle" font-size="12" fill="#2d3748">a&#x2082; = DOUBLE</text>
  <text x="1062" y="298" text-anchor="middle" font-size="12" fill="#2d3748">a&#x2083; = SPLIT</text>
  <text x="1062" y="322" text-anchor="middle" font-size="11" fill="#7b341e" font-style="italic">illegal-action mask applied</text>

  <!-- Target Network Row -->
  <text x="80" y="430" font-size="14" font-weight="600" fill="#2d3748">Target Network &#x3B8;&#x207B;</text>

  <rect x="298" y="450" width="160" height="80" rx="10" fill="url(#targetGrad)" stroke="#6b46c1" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="378" y="480" text-anchor="middle" font-size="14" font-weight="700" fill="#44337a">FC 512</text>
  <text x="378" y="500" text-anchor="middle" font-size="12" fill="#6b46c1">+ ReLU</text>
  <text x="378" y="518" text-anchor="middle" font-size="11" fill="#4a5568">frozen copy</text>

  <rect x="516" y="450" width="160" height="80" rx="10" fill="url(#targetGrad)" stroke="#6b46c1" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="596" y="480" text-anchor="middle" font-size="14" font-weight="700" fill="#44337a">FC 512</text>
  <text x="596" y="500" text-anchor="middle" font-size="12" fill="#6b46c1">+ ReLU</text>
  <text x="596" y="518" text-anchor="middle" font-size="11" fill="#4a5568">soft-updated</text>

  <rect x="734" y="450" width="160" height="80" rx="10" fill="url(#targetGrad)" stroke="#6b46c1" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="814" y="480" text-anchor="middle" font-size="14" font-weight="700" fill="#44337a">FC 256</text>
  <text x="814" y="500" text-anchor="middle" font-size="12" fill="#6b46c1">+ ReLU</text>
  <text x="814" y="518" text-anchor="middle" font-size="11" fill="#4a5568">target Q-values</text>

  <!-- Soft update arrows -->
  <line x1="378" y1="340" x2="378" y2="446" stroke="#805ad5" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDashed)"/>
  <line x1="596" y1="340" x2="596" y2="446" stroke="#805ad5" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDashed)"/>
  <line x1="814" y1="340" x2="814" y2="446" stroke="#805ad5" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDashed)"/>

  <!-- Soft update label -->
  <rect x="940" y="460" width="240" height="60" rx="8" fill="#faf5ff" stroke="#6b46c1" stroke-width="1"/>
  <text x="1060" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#44337a">Polyak / Soft Update</text>
  <text x="1060" y="502" text-anchor="middle" font-size="12" fill="#553c9a">&#x3B8;&#x207B; &#x2190; &#x3C4;&#x3B8; + (1&#x2212;&#x3C4;)&#x3B8;&#x207B;,  &#x3C4;=0.005</text>

  <!-- Loss block -->
  <rect x="60" y="600" width="500" height="120" rx="10" fill="#fff5f5" stroke="#c53030" stroke-width="1.5"/>
  <text x="310" y="628" text-anchor="middle" font-size="14" font-weight="700" fill="#742a2a">Optimisation Objective (Double DQN)</text>
  <text x="310" y="656" text-anchor="middle" font-size="13" fill="#2d3748">y = r + &#x3B3; Q&#x3B8;&#x207B;( s', argmax&#x2090; Q&#x3B8;(s', a) )</text>
  <text x="310" y="678" text-anchor="middle" font-size="13" fill="#2d3748">L(&#x3B8;) = MSE( Q&#x3B8;(s, a), y )</text>
  <text x="310" y="702" text-anchor="middle" font-size="11" fill="#742a2a" font-style="italic">AdamW, lr=1e-4, grad-clip=10, &#x3B3;=0.99</text>

  <!-- Replay buffer block -->
  <rect x="600" y="600" width="600" height="120" rx="10" fill="#f0fff4" stroke="#2f855a" stroke-width="1.5"/>
  <text x="900" y="628" text-anchor="middle" font-size="14" font-weight="700" fill="#22543d">Uniform Experience Replay</text>
  <text x="900" y="656" text-anchor="middle" font-size="13" fill="#2d3748">D = { (s&#x209C;, a&#x209C;, r&#x209C;, s&#x209C;&#x208A;&#x2081;, d&#x209C;) }, |D| = 500,000</text>
  <text x="900" y="678" text-anchor="middle" font-size="12" fill="#2d3748">Random mini-batch sampling, batch_size = 256</text>
  <text x="900" y="702" text-anchor="middle" font-size="11" fill="#22543d" font-style="italic">No prioritisation &#x2014; every transition is sampled uniformly</text>
</svg>
