<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 880" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fafc"/>
    </linearGradient>
    <linearGradient id="seqGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ebf4ff"/>
      <stop offset="100%" stop-color="#bee3f8"/>
    </linearGradient>
    <linearGradient id="rnnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5f7"/>
      <stop offset="100%" stop-color="#fbb6ce"/>
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6fffa"/>
      <stop offset="100%" stop-color="#81e6d9"/>
    </linearGradient>
    <linearGradient id="valueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#d6bcfa"/>
    </linearGradient>
    <linearGradient id="advGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#fbd38d"/>
    </linearGradient>
    <linearGradient id="qGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#feb2b2"/>
    </linearGradient>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d3748"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#805ad5"/>
    </marker>
  </defs>

  <rect width="1400" height="880" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="700" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#1a365d">
    Proposed Architecture &#x2014; Recurrent Dueling Double DQN with Prioritised Replay
  </text>
  <text x="700" y="72" text-anchor="middle" font-size="14" fill="#4a5568">
    Designed around the sequential, partially-observable nature of a Blackjack shoe
  </text>

  <!-- ===== Sequential Input Block ===== -->
  <rect x="40" y="120" width="240" height="320" rx="12" fill="url(#seqGrad)" stroke="#2c5282" stroke-width="2"/>
  <text x="160" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#1a365d">Sequential Input</text>
  <text x="160" y="168" text-anchor="middle" font-size="12" fill="#2c5282">Last L = 16 timesteps</text>

  <!-- Time-step bars -->
  <g font-size="11" fill="#1a365d">
    <rect x="60" y="184" width="200" height="28" rx="4" fill="#ffffff" stroke="#2c5282" stroke-width="1"/>
    <text x="160" y="202" text-anchor="middle">s&#x209C;&#x208B;&#x2081;&#x2085; (12-D engineered + card emb.)</text>

    <rect x="60" y="218" width="200" height="28" rx="4" fill="#ffffff" stroke="#2c5282" stroke-width="1"/>
    <text x="160" y="236" text-anchor="middle">s&#x209C;&#x208B;&#x2081;&#x2084;</text>

    <text x="160" y="262" text-anchor="middle" fill="#4a5568">&#x22EE;</text>

    <rect x="60" y="270" width="200" height="28" rx="4" fill="#ffffff" stroke="#2c5282" stroke-width="1"/>
    <text x="160" y="288" text-anchor="middle">s&#x209C;&#x208B;&#x2081;</text>

    <rect x="60" y="304" width="200" height="32" rx="4" fill="#bee3f8" stroke="#2c5282" stroke-width="2"/>
    <text x="160" y="324" text-anchor="middle" font-weight="700">s&#x209C; (current decision)</text>
  </g>

  <line x1="60" y1="358" x2="260" y2="358" stroke="#2c5282" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="160" y="376" text-anchor="middle" font-size="11" fill="#2d3748">Card-draw history is encoded</text>
  <text x="160" y="392" text-anchor="middle" font-size="11" fill="#2d3748">via a learnable embedding of</text>
  <text x="160" y="408" text-anchor="middle" font-size="11" fill="#2d3748">rank tokens {2&#x2026;A} concatenated</text>
  <text x="160" y="424" text-anchor="middle" font-size="11" fill="#2d3748">with engineered features.</text>

  <!-- arrow to encoder -->
  <line x1="284" y1="280" x2="334" y2="280" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- ===== Recurrent Encoder ===== -->
  <rect x="338" y="190" width="220" height="180" rx="12" fill="url(#rnnGrad)" stroke="#b83280" stroke-width="2"/>
  <text x="448" y="220" text-anchor="middle" font-size="15" font-weight="700" fill="#702459">Recurrent Encoder</text>
  <text x="448" y="244" text-anchor="middle" font-size="13" fill="#b83280">2-layer LSTM</text>
  <text x="448" y="266" text-anchor="middle" font-size="12" fill="#2d3748">hidden = 128, dropout = 0.1</text>
  <text x="448" y="290" text-anchor="middle" font-size="12" fill="#2d3748">h&#x209C; &#x2208; &#x211D;&#xB9;&#xB2;&#x2078;</text>
  <line x1="358" y1="306" x2="538" y2="306" stroke="#b83280" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="448" y="326" text-anchor="middle" font-size="11" fill="#702459" font-style="italic">Captures shoe composition,</text>
  <text x="448" y="342" text-anchor="middle" font-size="11" fill="#702459" font-style="italic">implicit count, sub-hand context</text>
  <text x="448" y="358" text-anchor="middle" font-size="11" fill="#702459" font-style="italic">that a feed-forward net cannot.</text>

  <line x1="562" y1="280" x2="612" y2="280" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- ===== Shared Trunk ===== -->
  <rect x="616" y="220" width="180" height="120" rx="12" fill="url(#trunkGrad)" stroke="#2c7a7b" stroke-width="2"/>
  <text x="706" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#234e52">Shared Trunk</text>
  <text x="706" y="272" text-anchor="middle" font-size="13" fill="#2c7a7b">FC 256 + ReLU</text>
  <text x="706" y="294" text-anchor="middle" font-size="13" fill="#2c7a7b">FC 256 + ReLU</text>
  <text x="706" y="318" text-anchor="middle" font-size="11" fill="#234e52">LayerNorm + dropout 0.1</text>

  <!-- Branch arrows -->
  <line x1="800" y1="260" x2="868" y2="180" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="800" y1="300" x2="868" y2="380" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- ===== Value Stream ===== -->
  <rect x="872" y="120" width="240" height="120" rx="12" fill="url(#valueGrad)" stroke="#6b46c1" stroke-width="2"/>
  <text x="992" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#44337a">Value Stream</text>
  <text x="992" y="172" text-anchor="middle" font-size="13" fill="#6b46c1">FC 128 + ReLU &#x2192; FC 1</text>
  <text x="992" y="196" text-anchor="middle" font-size="14" fill="#2d3748">V(s) &#x2208; &#x211D;</text>
  <text x="992" y="222" text-anchor="middle" font-size="11" fill="#44337a" font-style="italic">"How good is this state?"</text>

  <!-- ===== Advantage Stream ===== -->
  <rect x="872" y="320" width="240" height="120" rx="12" fill="url(#advGrad)" stroke="#c05621" stroke-width="2"/>
  <text x="992" y="350" text-anchor="middle" font-size="15" font-weight="700" fill="#7b341e">Advantage Stream</text>
  <text x="992" y="372" text-anchor="middle" font-size="13" fill="#c05621">FC 128 + ReLU &#x2192; FC 4</text>
  <text x="992" y="396" text-anchor="middle" font-size="14" fill="#2d3748">A(s, &#xB7;) &#x2208; &#x211D;&#x2074;</text>
  <text x="992" y="422" text-anchor="middle" font-size="11" fill="#7b341e" font-style="italic">"Which action stands out?"</text>

  <!-- Aggregation arrows -->
  <line x1="1116" y1="180" x2="1180" y2="260" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="1116" y1="380" x2="1180" y2="300" stroke="#2d3748" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- ===== Aggregation / Q output ===== -->
  <rect x="1184" y="200" width="200" height="160" rx="12" fill="url(#qGrad)" stroke="#9b2c2c" stroke-width="2"/>
  <text x="1284" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#742a2a">Dueling Aggregation</text>
  <text x="1284" y="252" text-anchor="middle" font-size="12" fill="#2d3748">Q(s, a) = V(s) +</text>
  <text x="1284" y="270" text-anchor="middle" font-size="12" fill="#2d3748">A(s, a) &#x2212; (1/|A|) &#x3A3; A(s, a')</text>
  <line x1="1204" y1="284" x2="1364" y2="284" stroke="#9b2c2c" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="1284" y="304" text-anchor="middle" font-size="13" font-weight="700" fill="#742a2a">Q(s, &#xB7;) &#x2208; &#x211D;&#x2074;</text>
  <text x="1284" y="322" text-anchor="middle" font-size="11" fill="#2d3748">{HIT, STAND, DOUBLE, SPLIT}</text>
  <text x="1284" y="342" text-anchor="middle" font-size="11" fill="#742a2a" font-style="italic">illegal-action mask &#x2192; &#x2212;&#x221E;</text>

  <!-- ===== Bottom row: target net + PER + Double DQN ===== -->

  <!-- Target Network -->
  <rect x="40" y="500" width="380" height="170" rx="12" fill="#faf5ff" stroke="#6b46c1" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="230" y="528" text-anchor="middle" font-size="15" font-weight="700" fill="#44337a">Target Network &#x3B8;&#x207B;</text>
  <text x="230" y="550" text-anchor="middle" font-size="12" fill="#6b46c1">Same architecture, weights frozen between updates</text>
  <text x="230" y="582" text-anchor="middle" font-size="13" fill="#2d3748">Polyak update: &#x3B8;&#x207B; &#x2190; &#x3C4;&#x3B8; + (1&#x2212;&#x3C4;)&#x3B8;&#x207B;</text>
  <text x="230" y="604" text-anchor="middle" font-size="13" fill="#2d3748">&#x3C4; = 0.005 (every gradient step)</text>
  <text x="230" y="634" text-anchor="middle" font-size="12" fill="#44337a" font-style="italic">Stabilises bootstrapped targets</text>
  <text x="230" y="652" text-anchor="middle" font-size="12" fill="#44337a" font-style="italic">and decouples them from current &#x3B8;</text>

  <line x1="230" y1="498" x2="230" y2="376" stroke="#805ad5" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowSoft)"/>

  <!-- Double DQN Update -->
  <rect x="450" y="500" width="480" height="170" rx="12" fill="#fff5f5" stroke="#c53030" stroke-width="2"/>
  <text x="690" y="528" text-anchor="middle" font-size="15" font-weight="700" fill="#742a2a">Double DQN Target</text>
  <text x="690" y="558" text-anchor="middle" font-size="13" fill="#2d3748">a* = argmax&#x2090; Q&#x3B8;( s', a )</text>
  <text x="690" y="580" text-anchor="middle" font-size="13" fill="#2d3748">y = r + &#x3B3; &#xB7; Q&#x3B8;&#x207B;( s', a* )</text>
  <text x="690" y="608" text-anchor="middle" font-size="13" fill="#2d3748">L(&#x3B8;) = &#x1D53C;[ w &#xB7; ( Q&#x3B8;(s,a) &#x2212; y )&#xB2; ]</text>
  <text x="690" y="638" text-anchor="middle" font-size="11" fill="#742a2a" font-style="italic">w = importance-sampling weight from PER</text>
  <text x="690" y="656" text-anchor="middle" font-size="11" fill="#742a2a" font-style="italic">Decouples action selection from action evaluation</text>

  <!-- PER Buffer -->
  <rect x="960" y="500" width="400" height="170" rx="12" fill="#f0fff4" stroke="#2f855a" stroke-width="2"/>
  <text x="1160" y="528" text-anchor="middle" font-size="15" font-weight="700" fill="#22543d">Prioritised Experience Replay</text>
  <text x="1160" y="556" text-anchor="middle" font-size="13" fill="#2f855a">P(i) &#x221D; |&#x3B4;&#x1D62;|&#x1D45C; + &#x3B5;</text>
  <text x="1160" y="580" text-anchor="middle" font-size="12" fill="#2d3748">&#x3B1; = 0.6 (priority exponent)</text>
  <text x="1160" y="600" text-anchor="middle" font-size="12" fill="#2d3748">&#x3B2; : 0.4 &#x2192; 1.0 (anneal over training)</text>
  <text x="1160" y="624" text-anchor="middle" font-size="12" fill="#2d3748">|D| = 1,000,000 transitions, sum-tree</text>
  <text x="1160" y="652" text-anchor="middle" font-size="11" fill="#22543d" font-style="italic">Focuses learning on high-TD-error transitions</text>

  <!-- ===== Footer info ===== -->
  <rect x="40" y="710" width="1320" height="140" rx="12" fill="#edf2f7" stroke="#4a5568" stroke-width="1"/>
  <text x="700" y="738" text-anchor="middle" font-size="14" font-weight="700" fill="#1a365d">
    Why this architecture matches the data
  </text>

  <text x="60" y="766" font-size="12" fill="#2d3748">
    <tspan font-weight="700">1. Sequential / partially-observable shoe.</tspan>
    <tspan> The deck composition evolves between hands; the LSTM lets the agent learn its own count features rather than depending solely on the engineered Hi-Lo signal.</tspan>
  </text>
  <text x="60" y="790" font-size="12" fill="#2d3748">
    <tspan font-weight="700">2. State value vs. action advantage.</tspan>
    <tspan> Many Blackjack states share the same optimal action across small variations. Decoupling V(s) and A(s, a) yields lower-variance gradients and faster convergence.</tspan>
  </text>
  <text x="60" y="814" font-size="12" fill="#2d3748">
    <tspan font-weight="700">3. Sparse, high-impact transitions.</tspan>
    <tspan> Splits, doubles and high-true-count decisions are rare but informative. PER samples them more often, fixing a known weakness of uniform replay.</tspan>
  </text>
  <text x="60" y="838" font-size="12" fill="#2d3748">
    <tspan font-weight="700">4. Q-value overestimation.</tspan>
    <tspan> Retained from the base; combined with the new dueling head it consistently dampens the optimistic bias observed in vanilla DQN.</tspan>
  </text>
</svg>
